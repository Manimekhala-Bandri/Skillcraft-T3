<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Quiz Game</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="quiz-container">

<h1>🧠Quiz Game</h1>

<div id="category-screen">

<h2>Select Category</h2>

<button onclick="startQuiz('html')">
🌐 HTML
</button>

<button onclick="startQuiz('css')">
🎨 CSS
</button>

<button onclick="startQuiz('js')">
💻 JavaScript
</button>

</div>


<div id="quiz" class="hidden">

<h2 id="question">
Question
</h2>

<div class="progress-container">

<div id="progress-bar">

</div>

</div>

<p id="progress"></p>
<p id="timer">
⏳ Time Left: 10s
</p>

<div id="answers"></div>

<button id="next-btn">
Next
</button>

</div>


<div id="result" class="hidden">

<h2>

Your Score:

<span id="score"></span>
<p id="high-score">

🏆 High Score: 0

</p>
</h2>

<button onclick="restartQuiz()">
Restart
</button>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="script.js"></script>
</body>

</html>
